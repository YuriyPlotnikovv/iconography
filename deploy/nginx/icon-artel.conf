
# HTTP server: handles ACME challenge and proxies app and cockpit
server {
    listen 80;
    server_name icon-artel.ru www.icon-artel.ru;

    # Allow Let's Encrypt ACME challenge (webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Cockpit as a separate site under /cockpit
    location /cockpit/ {
        alias /var/www/cockpit/;
        index index.php index.html index.htm;
        try_files $uri $uri/ /cockpit/index.php?$query_string;

        # PHP handling inside cockpit directory
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        }
    }

    # All other requests — proxy to application in container (listening on 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/icon-artel.access.log;
    error_log /var/log/nginx/icon-artel.error.log;
}

# NOTE: certbot will create/modify the HTTPS vhost automatically when run with --nginx


