name: Build & Deploy Docker

on:
  pull_request:
    types: [ closed ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yuriyplotnikovv/iconography

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COCKPIT_API_URL=${{ secrets.COCKPIT_API_URL }}
            COCKPIT_API_KEY=${{ secrets.COCKPIT_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy docker-compose and nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.yml,deploy/nginx/icon-artel.conf"
          target: "/opt/icon-artel-deploy/"

      - name: Deploy on server (write .env, pull image and restart + setup SSL)
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          NEXT_PUBLIC_SITE_URL: https://icon-artel.ru
          NEXT_PUBLIC_CAPTCHA_SITE_KEY: ${{ secrets.CAPTCHA_SITE_KEY }}
          CAPTCHA_SECRET: ${{ secrets.CAPTCHA_SECRET }}
          COCKPIT_API_URL: ${{ secrets.COCKPIT_API_URL }}
          COCKPIT_API_KEY: ${{ secrets.COCKPIT_API_KEY }}
          YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_NAME,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_CAPTCHA_SITE_KEY,CAPTCHA_SECRET,COCKPIT_API_URL,COCKPIT_API_KEY,YANDEX_MAPS_API_KEY
          script: |
            set -euo pipefail
            echo "🚀 Starting deployment process..."

            mkdir -p /opt/icon-artel-deploy
            cd /opt/icon-artel-deploy

            echo "📝 Writing .env file..."
            cat > .env <<EOF
            IMAGE_NAME=$IMAGE_NAME
            NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL
            NEXT_PUBLIC_CAPTCHA_SITE_KEY=$NEXT_PUBLIC_CAPTCHA_SITE_KEY
            CAPTCHA_SECRET=$CAPTCHA_SECRET
            COCKPIT_API_URL=$COCKPIT_API_URL
            COCKPIT_API_KEY=$COCKPIT_API_KEY
            NEXT_PUBLIC_YANDEX_MAPS_API_KEY=$YANDEX_MAPS_API_KEY
            EOF
            echo "✅ .env file written"

            echo "🔑 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "⏹️  Stopping old containers (if any)..."
            docker compose -f docker-compose.yml down || true

            echo "📦 Pulling new image: ghcr.io/$IMAGE_NAME:latest"
            echo "📊 Starting download at $(date)"
            if timeout 1200 docker pull ghcr.io/$IMAGE_NAME:latest; then
              echo "✅ Image pulled successfully at $(date)"
            else
              echo "❌ Pull failed or timed out!"
            docker images | grep iconography || echo "No image found"
            exit 1
            fi

            echo "🖼️  Available images:"
            docker images | grep iconography || echo "No iconography images found"

            echo "▶️  Starting container..."
            docker compose -f docker-compose.yml up -d

            echo "🧹 Cleaning up old images..."
            docker image prune -af || true

            echo "✅ Deployment finished"

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment (remote checks)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/icon-artel-deploy || true
            echo "🚦 Docker compose ps:";
            docker compose ps || true
            echo "\n📄 Recent logs:";
            docker compose logs --tail=50 || true
            echo "\n🌐 Quick HTTP check:";
            curl -I -sS http://127.0.0.1:3000 | head -n 5 || true


